detector:
  backend: retinaface
  retina_confidence: 0.65

recognition:
  experiment_tag: hybrid_overhead_extreme
  method: hybrid
  decision_threshold: 0.66
  knn_k: 7
  hybrid_alpha: 0.7
  mahalanobis_weight: 0.3
  margin_threshold: 0.03
  min_detect_prob: 0.75
  min_box_size: 18
  cosine_gate: null
  use_per_class_gate: false
  per_class_gate_percentile: 0.1
  per_class_gate_min_count: 8
  per_class_gate_cap: 0.85
  use_cohort_norm: false
  use_confusion_pair_margin: false
  quality_gate_enabled: false
  temporal_vote_enabled: false
  flip_average: true
  multi_centroids: true
  max_centroids: 3
  dedupe_per_image: true
  dedupe_session: true

camera:
  source: rtsp://admin:camera_01@192.168.60.128:554/stream1
  width: 1920
  height: 1088
  fps: 15
